---
name: ruff

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install ruff
        run: python3 -m pip install ruff==0.15.17
      - name: Lint (code-quality rules; config in pyproject.toml [tool.ruff])
        run: ruff check .
