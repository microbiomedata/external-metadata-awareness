---
name: ruff

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install ruff
        run: python3 -m pip install ruff==0.15.17
      - name: Lint (code-quality rules; config in pyproject.toml [tool.ruff])
        run: ruff check .
